name: CI — Testing & Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: LINT & TYPE CHECK
  # ═══════════════════════════════════════════════════════════════
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      
      - name: 📚 Instalar dependencias
        run: pnpm install --frozen-lockfile
      
      - name: ✅ Lint (ESLint)
        run: pnpm lint
      
      - name: ✅ Type check (TypeScript)
        run: pnpm typecheck
      
      - name: ✅ Format check (Prettier)
        run: pnpm format:check

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: UNIT & INTEGRATION TESTS
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: 📚 Instalar dependencias
        run: pnpm install --frozen-lockfile
      
      - name: 🛢️  Configurar BD de test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          pnpm prisma migrate deploy
          pnpm prisma db seed
      
      - name: 🧪 Correr Unit Tests (Vitest)
        run: pnpm test:unit
      
      - name: 🧪 Correr Integration Tests (Vitest)
        run: pnpm test:integration
        env:
          API_URL: http://localhost:3000/api
      
      - name: 📊 Generar Coverage Report
        run: pnpm test:coverage
      
      - name: 📤 Upload Coverage a Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: E2E TESTS CON PLAYWRIGHT
  # ═══════════════════════════════════════════════════════════════
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: 📚 Instalar dependencias
        run: pnpm install --frozen-lockfile
      
      - name: 🛢️  Configurar BD de test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          pnpm prisma migrate deploy
          pnpm prisma db seed
      
      - name: 🎭 Instalar navegadores Playwright
        run: pnpm exec playwright install --with-deps
      
      - name: 🚀 Construir Next.js
        run: pnpm build
      
      - name: ▶️  Iniciar servidor
        run: pnpm start &
        env:
          NODE_ENV: test
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      
      - name: ⏳ Esperar a que servidor esté listo
        run: |
          npx wait-on http://localhost:3000 --timeout 60000
      
      - name: 🎭 Correr E2E Tests (Playwright)
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      
      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: 📤 Upload Test Videos
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: BUILD VALIDATION
  # ═══════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: 📚 Instalar dependencias
        run: pnpm install --frozen-lockfile
      
      - name: 🔨 Build
        run: pnpm build
      
      - name: ✅ Build exitoso
        run: echo "✅ Build completado sin errores"

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: SUMMARY & STATUS CHECK
  # ═══════════════════════════════════════════════════════════════
  summary:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, e2e-tests, build]
    if: always()
    
    steps:
      - name: 📊 Resultados de CI
        run: |
          echo "════════════════════════════════════════════"
          echo "🎯 PIPELINE CI COMPLETADO"
          echo "════════════════════════════════════════════"
          echo ""
          echo "✅ Lint & TypeCheck: ${{ needs.lint-and-typecheck.result }}"
          echo "✅ Unit Tests: ${{ needs.unit-tests.result }}"
          echo "✅ E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "✅ Build: ${{ needs.build.result }}"
          echo ""
          echo "════════════════════════════════════════════"
      
      - name: ❌ Fallar si algún job falló
        if: |
          needs.lint-and-typecheck.result == 'failure' ||
          needs.unit-tests.result == 'failure' ||
          needs.e2e-tests.result == 'failure' ||
          needs.build.result == 'failure'
        run: exit 1
